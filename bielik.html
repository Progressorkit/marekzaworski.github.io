<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BIELIK | SYSTEM</title>
    <style>
        body { 
            background: #050505; 
            color: #c0c0c0; 
            font-family: 'Courier New', monospace; 
            display: flex; 
            flex-direction: column;
            align-items: center; 
            padding-top: 50px;
            margin: 0; 
            text-transform: uppercase;
        }
        .frame { 
            border: 1px double #c0c0c0; 
            padding: 30px; 
            text-align: left;
            background: rgba(15, 15, 15, 0.9);
            width: 80%;
            max-width: 600px;
            min-height: 150px;
        }
        #typewriter { line-height: 1.6; white-space: pre-wrap; }
        .cursor { display: inline-block; width: 10px; background-color: #c0c0c0; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }

        /* Sekcja przycisku PDF - domyślnie ukryta */
        #pdf-section {
            margin-top: 30px;
            opacity: 0;
            transition: opacity 2s ease-in; /* Płynne pojawianie się */
            text-align: center;
        }

        .btn-pdf {
            display: inline-block;
            border: 1px solid #c0c0c0;
            color: #c0c0c0;
            padding: 15px 30px;
            text-decoration: none;
            letter-spacing: 3px;
            background: rgba(192, 192, 192, 0.1);
        }
        .btn-pdf:hover { background: #c0c0c0; color: #000; }

        .back-link { margin: 40px 0; color: #444; text-decoration: none; font-size: 0.7rem; }
    </style>
</head>
<body>

    <div class="frame">
        <div id="typewriter"></div><span id="cursor" class="cursor">&nbsp;</span>
    </div>

    <div id="pdf-section">
    <p style="font-size: 0.7rem; color: #8b0000; margin-bottom: 15px;">WYKRYTO STRUMIEŃ DANYCH: RAPORT_LOG.HTML</p>
    <a href="raport.html" class="btn-pdf">OTWÓRZ DOKUMENTACJĘ</a>
</div>

    <a href="index.html" class="back-link">POWRÓT DO PANELU GŁÓWNEGO</a>

    <script>
        const text = "AUTORYZACJA POMYŚLNA...\nŁADOWANIE MODUŁU BIELIK...\nPROSZĘ CZEKAĆ...\n\nDANE ZOSTAŁY ODBLOKOWANE.";
        let i = 0;
        const speed = 60;

        function typeWriter() {
            if (i < text.length) {
                document.getElementById("typewriter").innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            } else {
                // Gdy pisanie się skończy:
                document.getElementById("cursor").style.display = "none"; // Usuń kursor
                document.getElementById("pdf-section").style.opacity = "1"; // Pokaż przycisk
            }
        }

        window.onload = typeWriter;
    </script>

</body>
</html>
